title: 1 Перекрытие
tooltip: >-
  Этап подготовки 1/3 — настройка перекрытия.
  Что делает: выбирает исходное перекрытие, записывает базовую точку и шаг плитки.
  Что заполняет: FP_Шаг_X/Y, FP_База_X/Y, FP_База_Z, FP_Смещение_X/Y.
  Рекомендация: укажите шаги в мм и проверьте, что смещение стартует с 0.
author: Egor
