title: 2 Периметр
tooltip: >-
  Этап подготовки 2/3 — периметр перекрытия.
  Что делает: строит контурные линии по верхней грани перекрытия.
  Стиль линий: RF_Contour (зеленый), чтобы контур визуально отличался от сетки.
  Что заполняет: RF_Contour_Lines_ID для последующего exact-анализа.
author: Egor
