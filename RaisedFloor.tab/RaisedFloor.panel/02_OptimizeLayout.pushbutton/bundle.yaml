title: 2 Подобрать раскладку
tooltip: >-
  Ключевой шаг: подбор оптимальной реальной раскладки плитки.
  Что делает: перебирает варианты смещения X/Y и считает exact-ячейки по фактическому периметру.
  Как выбирает лучший: минимизирует подрезки, сложные ячейки и проблемные зоны у колонн.
  Результат: записывает лучшее смещение в RF_Offset_X/Y и перерисовывает сетку.
author: Egor
