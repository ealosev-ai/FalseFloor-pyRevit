# RaisedFloor.extension Test Configuration
[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Markers
markers =
    unit: Unit tests (fast, no Revit API)
    integration: Integration tests (require Revit API mocks)
    revit: Tests that require Autodesk Revit API runtime
    geometry: Geometry-related tests (Clipper2)
    params: Parameter-related tests

# Coverage thresholds
[coverage:run]
source = lib
omit =
    */tests/*
    */__pycache__/*
    */.mypy_cache/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
