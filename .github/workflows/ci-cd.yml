# GitHub Actions CI/CD Workflow for RaisedFloor.extension
# Tests the pyRevit extension on multiple Python versions

name: CI/CD

on:
    push:
        branches: [main, develop]
        tags:
            - 'v*'
        paths:
            - 'lib/**/*.py'
            - 'tests/**/*.py'
            - 'RaisedFloor.tab/**/*.py'
            - 'RaisedFloor.tab/**/*.yaml'
            - 'RaisedFloor.tab/**/*.html'
            - 'RaisedFloor.tab/**/*.htm'
            - 'Families/**/*.rfa'
            - 'requirements.txt'
            - 'pytest.ini'
            - '.github/workflows/**/*.yml'

    pull_request:
        branches: [main, develop]
        paths:
            - 'lib/**/*.py'
            - 'tests/**/*.py'
            - 'RaisedFloor.tab/**/*.py'
            - 'RaisedFloor.tab/**/*.yaml'
            - 'RaisedFloor.tab/**/*.html'
            - 'RaisedFloor.tab/**/*.htm'
            - 'Families/**/*.rfa'
            - 'requirements.txt'
            - 'pytest.ini'
            - '.github/workflows/**/*.yml'

    # Allow manual workflow runs
    workflow_dispatch:

jobs:
    test:
        name: Test Python ${{ matrix.python-version }}
        runs-on: windows-latest

        strategy:
            fail-fast: false
            matrix:
                python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Set up Python ${{ matrix.python-version }}
              uses: actions/setup-python@v5
              with:
                  python-version: ${{ matrix.python-version }}
                  cache: 'pip'

            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install -r requirements.txt

            - name: List installed packages
              run: pip list

            - name: Run pytest
              run: |
                  pytest tests/ -m "not revit" -v --tb=short --cov=lib --cov-fail-under=60 --cov-report=term-missing --cov-report=xml
              env:
                  PYTHONPATH: ${{ github.workspace }};${{ github.workspace }}/lib

            - name: Upload coverage reports
              uses: codecov/codecov-action@v4
              with:
                  file: ./coverage.xml
                  flags: unittests
                  name: codecov-${{ matrix.python-version }}
                  fail_ci_if_error: false

    lint:
        name: Lint Code
        runs-on: windows-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: '3.11'
                  cache: 'pip'

            - name: Install linting tools
              run: |
                  pip install ruff mypy

            - name: Run Ruff linter
              run: ruff check lib/ RaisedFloor.tab/ tests/

            - name: Run Ruff formatter check
              run: ruff format --check lib/ RaisedFloor.tab/ tests/

            - name: Run MyPy type checker
              run: mypy lib/ --ignore-missing-imports --no-error-summary
              continue-on-error: true

    build:
        name: Build Release Package
        runs-on: windows-latest
        needs: [test, lint]
        if: github.event_name == 'push'

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Create release archive
              run: |
                  $timestamp = Get-Date -Format "yyyy-MM-dd"
                  $archiveName = "RaisedFloor.extension-$timestamp.zip"
                  $stageDir = Join-Path $PWD "_package"
                  if (Test-Path $stageDir) {
                    Remove-Item $stageDir -Recurse -Force
                  }
                  New-Item -ItemType Directory -Path $stageDir | Out-Null

                  # Runtime-only package for end users.
                  $items = @("lib", "RaisedFloor.tab", "Families", "resources", "README.md", "LICENSE", "CHANGELOG.md")
                  foreach ($item in $items) {
                    if (Test-Path $item) {
                      Copy-Item $item -Destination $stageDir -Recurse -Force
                    }
                  }

                  # Dev-only test runner button should not ship in production zip.
                  $testsPanel = Join-Path $stageDir "RaisedFloor.tab\RaisedFloor.panel\99_Tests.pulldown"
                  if (Test-Path $testsPanel) {
                    Remove-Item $testsPanel -Recurse -Force
                  }

                  # Drop local caches and bytecode from the staged runtime package.
                  Get-ChildItem -Path $stageDir -Recurse -Force -Directory |
                    Where-Object { $_.Name -in @("__pycache__", ".mypy_cache", ".pytest_cache", ".ruff_cache") } |
                    Remove-Item -Recurse -Force
                  Get-ChildItem -Path $stageDir -Recurse -Force -File |
                    Where-Object { $_.Extension -in @(".pyc", ".pyo") } |
                    Remove-Item -Force

                  Compress-Archive -Path (Join-Path $stageDir "*") -DestinationPath $archiveName -Force
                  echo "ARCHIVE_NAME=$archiveName" >> $env:GITHUB_ENV
              shell: pwsh
              working-directory: .

            - name: Upload release artifact
              uses: actions/upload-artifact@v4
              with:
                  name: release-package
                  path: ${{ env.ARCHIVE_NAME }}
                  retention-days: 30

    release:
        name: Publish GitHub Release
        runs-on: windows-latest
        needs: [build]
        if: startsWith(github.ref, 'refs/tags/v')
        permissions:
            contents: write

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Download release artifact
              uses: actions/download-artifact@v4
              with:
                  name: release-package

            - name: Extract changelog for this version
              id: changelog
              shell: pwsh
              run: |
                  $tag = "${{ github.ref_name }}"
                  $content = Get-Content CHANGELOG.md -Raw
                  # Extract section between first and second ## heading
                  $match = [regex]::Match($content, '(?s)(## .*?)(?=\n## |\z)')
                  $section = if ($match.Success) { $match.Groups[1].Value.Trim() } else { "See CHANGELOG.md" }
                  # Save to file to avoid quoting issues
                  $section | Out-File -FilePath release_notes.md -Encoding utf8

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ github.ref_name }}
                  name: '${{ github.ref_name }}'
                  body_path: release_notes.md
                  files: '*.zip'
                  draft: false
                  prerelease: false

    # Documentation check
    docs:
        name: Check Documentation
        runs-on: windows-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Check README exists
              run: |
                  if (-not (Test-Path "README.md")) {
                    Write-Error "README.md not found"
                    exit 1
                  }
              shell: pwsh

            - name: Check CHANGELOG exists
              run: |
                  if (-not (Test-Path "CHANGELOG.md")) {
                    Write-Error "CHANGELOG.md not found"
                    exit 1
                  }
              shell: pwsh

            - name: Validate markdown files
              run: |
                  $files = Get-ChildItem -Recurse -Include *.md
                  foreach ($file in $files) {
                    $content = Get-Content $file.FullName -Raw
                    if ([string]::IsNullOrWhiteSpace($content)) {
                      Write-Warning "Empty markdown file: $($file.FullName)"
                    }
                  }
              shell: pwsh
